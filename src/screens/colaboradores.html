<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Colaboradores</title>
    <link rel="icon" type="image/png" href="../assets/Logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/colaboradores.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo">
                <img src="../assets/Logo fundo azul.png" alt="Logo" class="brand-img">
            </div>
        </div>
        <nav class="menu-section">
            <p class="menu-header">Menu</p>
            <ul class="menu-list">
                <li class="menu-item">
                    <a href="../screens/inicial.html"><i class="fas fa-home"></i> <span>Início</span></a>
                </li>
                <li class="menu-item active">
                    <a href="../screens/colaboradores.html"><i class="fas fa-users"></i> <span>Colaboradores</span></a>
                </li>
                <li class="menu-item">
                    <a href="#"><i class="fas fa-folder-open"></i> <span>Arquivos</span></a>
                </li>
                <li class="menu-item">
                    <a href="#"><i class="fas fa-file-invoice-dollar"></i> <span>Pagamentos</span></a>
                </li>
                <li class="menu-item">
                    <a href="#"><i class="fas fa-robot"></i> <span>Analisar Currículo</span></a>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="content-header" id="content-header">
            <div class="header-title">
                <h1>Colaboradores</h1>
            </div>
            <button class="btn-primary" id="btn-open-form" onclick="toggleForm()">
                <i class="fas fa-plus"></i> Novo Colaborador
            </button>
        </header>

        <section class="form-section" id="form-container" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h3 id="form-title"><i class="fas fa-user-plus"></i> Novo Colaborador</h3>
                    <button class="btn-back" onclick="toggleForm()"><i class="fas fa-arrow-left"></i> Voltar</button>
                </div>

                <div class="tabs-nav">
                    <button type="button" class="tab-btn active" onclick="switchTab(event, 'tab-obrigatorios')">Dados Obrigatórios</button>
                    <button type="button" class="tab-btn" onclick="switchTab(event, 'tab-completos')">Dados Completos</button>
                </div>

                <form id="employee-form">
                    <input type="hidden" id="employee-id">

                    <div id="tab-obrigatorios" class="tab-panel active">
                        <p class="form-subtitle">Informações Básicas</p>
                        <div class="form-row">
                            <div class="form-group flex-2">
                                <label for="name">Nome Completo *</label>
                                <input type="text" id="name">
                            </div>
                            <div class="form-group flex-1">
                                <label for="admission-date">Data de Admissão *</label>
                                <input type="date" id="admission-date">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="contract-type">Tipo de Contrato *</label>
                                <select id="contract-type">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="CLT">CLT</option>
                                    <option value="PJ">PJ</option>
                                    <option value="Estágio">Estágio</option>
                                    <option value="Temporário">Temporário</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="payment-type">Tipo de Pagamento *</label>
                                <select id="payment-type">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="Mensal">Mensal Fixo</option>
                                    <option value="Quinzenal">Quinzenal</option>
                                    <option value="Semanal">Semanal</option>
                                </select>
                            </div>
                        </div>

                        <p class="form-subtitle">Informações Profissionais</p>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="dept">Departamento *</label>
                                <select id="dept">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="TI">Tecnologia da Informação</option>
                                    <option value="RH">Recursos Humanos</option>
                                    <option value="Financeiro">Financeiro</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="Administração">Administração</option>
                                    <option value="Vendas">Vendas</option>
                                </select>
                            </div>
                            <div class="form-group flex-2">
                                <label for="role">Cargo *</label>
                                <input type="text" id="role">
                            </div>
                            <div class="form-group">
                                <label for="salary">Salário (R$) *</label>
                                <input type="number" id="salary" min="0">
                            </div>
                            <div class="form-group">
                                <label for="status-select">Status *</label>
                                <select id="status-select">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="Ativo">Ativo</option>
                                    <option value="Inativo">Inativo</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="tab-completos" class="tab-panel">
                        <p class="form-subtitle">Informações Pessoais</p>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="birth-date">Data de Nascimento</label>
                                <input type="date" id="birth-date">
                            </div>
                            <div class="form-group">
                                <label for="gender">Sexo</label>
                                <select id="gender">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="Masculino">Masculino</option>
                                    <option value="Feminino">Feminino</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="civil-status">Estado Civil</label>
                                <select id="civil-status">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="Solteiro">Solteiro(a)</option>
                                    <option value="Casado">Casado(a)</option>
                                    <option value="Divorciado">Divorciado(a)</option>
                                    <option value="Viúvo">Viúvo(a)</option>
                                </select>
                            </div>
                        </div>

                        <p class="form-subtitle">Endereço Residencial</p>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label for="zipcode">CEP</label>
                                <input type="text" id="zipcode" maxlength="9">
                            </div>
                            <div class="form-group flex-3">
                                <label for="address">Logradouro</label>
                                <input type="text" id="address">
                            </div>
                            <div class="form-group flex-1">
                                <label for="number">Número</label>
                                <input type="text" id="number">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group flex-2">
                                <label for="neighborhood">Bairro</label>
                                <input type="text" id="neighborhood">
                            </div>
                            <div class="form-group flex-2">
                                <label for="city">Cidade</label>
                                <input type="text" id="city">
                            </div>
                            <div class="form-group flex-0-5">
                                <label for="state">UF</label>
                                <input type="text" id="state" maxlength="2">
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="toggleForm()">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" class="btn-primary btn-save" id="btn-save">
                            <i class="fas fa-check"></i> Cadastrar
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section class="list-section" id="list-section">
            <div class="filter-container">
                <button class="btn-filter active" data-filter="todos">Todos</button>
                <button class="btn-filter" data-filter="ativos">Ativos</button>
                <button class="btn-filter" data-filter="inativos">Inativos</button>
            </div>

            <div class="table-container">
                <table class="employee-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Departamento</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="employee-list-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
    
    <div id="employee-drawer" class="drawer">
        <div class="drawer-header">
            <div class="header-content">
                <div class="avatar-placeholder"><i class="fas fa-user"></i></div>
                <div class="header-text">
                    <h2 id="view-name">Nome do Colaborador</h2>
                    <p id="view-role" class="subtitle">Cargo</p>
                </div>
            </div>
            <button class="btn-close-drawer" onclick="closeDrawer()" title="Fechar"><i class="fas fa-times"></i></button>
        </div>

        <div class="drawer-body">
            <div class="info-card">
                <div class="info-item">
                    <label><i class="fas fa-building"></i> Departamento</label>
                    <p id="view-dept">-</p>
                </div>
                <div class="info-item">
                    <label><i class="fas fa-calendar-alt"></i> Admissão</label>
                    <p id="view-date">-</p>
                </div>
            </div>

            <div class="info-card">
                <div class="info-item">
                    <label><i class="fas fa-money-bill-wave"></i> Salário Atual</label>
                    <p id="view-salary" class="salary-highlight">-</p>
                </div>
                <div class="info-item">
                    <label><i class="fas fa-info-circle"></i> Status</label>
                    <div>
                        <span id="view-status" class="badge">-</span>
                    </div>
                </div>
            </div>
            <div class="drawer-footer">
                <button type="button" class="btn-close-modern" onclick="closeDrawer()">Fechar Visualização</button>
            </div>
        </div>
    </div>
    <script src="../javascript/colaboradores.js"></script>
</body>
</html>
